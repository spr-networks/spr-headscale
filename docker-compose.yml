version: '3.4'

x-labels:
  &default-labels
  # constant (not $CI) so digests are reproducible across CI/local
  org.supernetworks.ci: "true"
  org.supernetworks.version: ${RELEASE_VERSION:-latest}${RELEASE_CHANNEL:-}

services:
  spr-headscale:
    container_name: spr-headscale
    image: ghcr.io/spr-networks/spr-headscale:latest
    build:
      context: "${BUILDCTX:-.}"
      labels: *default-labels
    security_opt:
      - no-new-privileges:true
    networks:
      headscalenet:
    volumes:
      - "${SUPERDIR}./state/plugins/spr-headscale:/state/plugins/spr-headscale"
      - "${SUPERDIR}./configs/base/config.sh:/configs/base/config.sh:ro"
      - "${SUPERDIR}./configs/plugins/spr-headscale:/configs/spr-headscale"

# The bridge name must match NetworkCapabilities.Interface in plugin.json and
# the Interface used for the /firewall/custom_interface rule in install.sh.
networks:
  headscalenet:
    name: spr-headscale
    driver_opts:
      com.docker.network.bridge.name: spr-headscale
